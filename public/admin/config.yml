backend:
  name: github
  repo: aashishace/arcbuilders
  branch: main
  base_url: https://arcbuilders.com.au
  auth_endpoint: /api/auth

publish_mode: editorial_workflow
media_folder: "public/uploads"
public_folder: "/uploads"
site_url: https://arcbuilders.com.au

collections:
  - name: blog
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Must be lowercase with hyphens only'] }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Meta Description", name: "metaDescription", widget: "text", hint: "SEO description for SERP snippet, ideally 140-160 characters." }
      - { label: "Primary Target Keyword", name: "targetKeyword", widget: "string", hint: "Exact keyword phrase this post targets." }
      - { label: "Suburb Intent", name: "suburbIntent", widget: "list", allow_add: true, hint: "Suburbs or local areas this post is intended to rank for." }
      - { label: "Category", name: "category", widget: "select", options: ["Vastu & Design", "Family Living", "Building Process", "Investment", "Industry Insights", "Renovation Tips", "Sustainability"] }
      - { label: "Author", name: "author", widget: "string", default: "ARC Builders Team" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Read Time", name: "readTime", widget: "string", default: "5 min read" }
      - { label: "Hero Image", name: "heroImage", widget: "image" }
      - { label: "Tags", name: "tags", widget: "list", allow_add: true }
      - { label: "Body", name: "body", widget: "markdown" }
